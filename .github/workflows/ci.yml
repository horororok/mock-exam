name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.mdx"
      - ".gitignore"
      - ".env.example"
      - ".dev.vars.example"
      - "public/**"
      - "LICENSE"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.mdx"
      - ".gitignore"
      - ".env.example"
      - ".dev.vars.example"
      - "public/**"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SKIP_ENV_VALIDATION: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec opennextjs-cloudflare build

  deploy:
    name: Deploy to Cloudflare
    # CI(lint·typecheck·build) 통과 후에만 배포. PR에서는 실행하지 않음.
    needs: [lint, typecheck, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    # 배포는 CI와 달리 진행 중인 작업을 취소하지 않는다(중간 배포 보호).
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # database_id는 wrangler.jsonc에 직접 들어있으므로 주입 단계 불필요.
      # 마이그레이션은 d1-http 드라이버용 env(아래)로 동작한다.
      - name: Run database migrations
        run: pnpm drizzle-kit migrate
        env:
          NODE_ENV: production
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          # drizzle.config.ts가 D1 HTTP 드라이버에서 읽는 토큰
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_D1_TOKEN }}

      - name: Build & Deploy Worker
        run: pnpm run deploy
        env:
          NODE_ENV: production
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Mock Exam logo icon · answer sheet + grading check -->

  <!-- soft shadow -->
  <rect x="24" y="13" width="54" height="74" rx="8" fill="#142142" opacity="0.14" transform="rotate(-5 48 48)"/>

  <g transform="rotate(-5 48 48)">
    <!-- sheet -->
    <rect x="21" y="8" width="54" height="74" rx="8" fill="#FFF8EC" stroke="#142142" stroke-width="4"/>

    <!-- title line -->
    <line x1="31" y1="21" x2="57" y2="21" stroke="#142142" stroke-width="4.5" stroke-linecap="round"/>

    <!-- row 1 -->
    <circle cx="35" cy="35" r="4.6" fill="none" stroke="#142142" stroke-width="3"/>
    <line x1="46" y1="35" x2="64" y2="35" stroke="#142142" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>

    <!-- row 2 · marked answer -->
    <circle cx="35" cy="50" r="5.4" fill="#FF5A3C"/>
    <line x1="46" y1="50" x2="64" y2="50" stroke="#142142" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>

    <!-- row 3 -->
    <circle cx="35" cy="65" r="4.6" fill="none" stroke="#142142" stroke-width="3"/>
    <line x1="46" y1="65" x2="60" y2="65" stroke="#142142" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- big red grading check -->
  <path d="M50 63 L62 76 L86 44" fill="none" stroke="#FF5A3C" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M50 63 L62 76 L86 44" fill="none" stroke="#FFF8EC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>
</svg>
